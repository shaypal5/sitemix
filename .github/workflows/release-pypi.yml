name: Release PyPI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.release_guard.outputs.should_publish }}
      version: ${{ steps.release_guard.outputs.version }}
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/sitemix/
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine whether this push is a release commit
        id: release_guard
        run: |
          python - <<'PY'
          import os
          import pathlib
          import subprocess
          import tomllib

          current_version = tomllib.loads(
              pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          )["project"]["version"]

          previous_pyproject = subprocess.run(
              ["git", "show", "HEAD^:pyproject.toml"],
              check=False,
              capture_output=True,
              text=True,
          )
          if previous_pyproject.returncode == 0:
              previous_version = tomllib.loads(previous_pyproject.stdout)["project"]["version"]
          else:
              previous_version = None

          should_publish = previous_version != current_version
          decision = "yes" if should_publish else "no"
          with pathlib.Path("/tmp/release_outputs.txt").open("w", encoding="utf-8") as f:
              f.write(f"should_publish={decision}\\n")
              f.write(f"version={current_version}\\n")

          with pathlib.Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8") as f:
              f.write(f"SHOULD_PUBLISH={decision}\\n")
              f.write(f"RELEASE_VERSION={current_version}\\n")

          print(
              "Release decision:",
              {
                  "should_publish": should_publish,
                  "current_version": current_version,
                  "previous_version": previous_version,
              },
          )
          PY
          cat /tmp/release_outputs.txt >> "$GITHUB_OUTPUT"

      - name: Skip publish (no version change)
        if: ${{ env.SHOULD_PUBLISH == 'no' }}
        run: echo "No pyproject version change detected; skipping publish."

      - name: Build package
        if: ${{ env.SHOULD_PUBLISH == 'yes' }}
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        if: ${{ env.SHOULD_PUBLISH == 'yes' }}
        uses: pypa/gh-action-pypi-publish@release/v1
